name: GH Gist test

on:
  workflow_dispatch:
    inputs:
      gist_file_name:
        description: "Gist File Name"
        required: true
        type: string
        default: ""

jobs:
  run-gh-cli:
    name: Run GH CLI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Check GH CLI
        run: gh --version
      - name: Check GH auth
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | gh auth login --with-token
          gh auth status

      - name: Touch test file
        run: |
          echo "Hello, World!" > hello.txt

      - name: upload to artifact
        id: artifact-uploader
        uses: actions/upload-artifact@v4
        with:
          name: test-file.txt
          path: hello.txt
          compression-level: 0 # no compression

      - name: Generate
        run: |
          echo "artifact: ${{ env.ARTIFACT_URL }}"
        env:
          ARTIFACT_URL: ${{ steps.artifact-uploader.outputs.artifact-url }}
